<!DOCTYPE html>
<html>
<head>
<title>Remoteverbindung</title>
<style>
body {
  font-family: sans-serif;
  background-color: #f4f4f4;
  color: #333;
}
.container {
  width: 80%;
  margin: 20px auto;
  background-color: white;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
h2 {
  color: #2196F3; /* Hellblau */
}
.form-group {
  margin-bottom: 15px;
}
label {
  display: block;
  margin-bottom: 5px;
}
input[type="text"],
input[type="password"],
select {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  box-sizing: border-box;
}
input[type="password"] {
  position: relative;
}
.eye-icon {
  position: absolute;
  top: 50%;
  right: 10px;
  transform: translateY(-50%);
  cursor: pointer;
}
button {
  background-color: #2196F3; /* Hellblau */
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
.group-container {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
}
.group {
  background-color: #e0e0e0;
  padding: 10px;
  border-radius: 4px;
}
.group button {
  display: block;
  width: 100%;
  margin-bottom: 5px;
}
</style>
</head>
<body>
  <div class="container">
    <h2>Remoteverbindung herstellen</h2>
    <div class="form-group">
      <label for="verbindungstyp">Verbindungstyp:</label>
      <select id="verbindungstyp">
        <option value="rdp">Remote Desktop</option>
        <option value="remotehilfe">Remote Hilfe</option>
      </select>
    </div>
    <div class="form-group">
      <label for="benutzer">Benutzer:</label>
      <input type="text" id="benutzer" placeholder="Benutzername">
    </div>
    <div class="form-group">
      <label for="passwort">Passwort:</label>
      <input type="password" id="passwort" placeholder="Passwort">
      <span class="eye-icon" onclick="togglePasswordVisibility()">&#128065;</span>
    </div>

    <div class="group-container">
      <div class="group">
        <h3>Seminarräume</h3>
        <button>Client A</button>
        <button>Client B</button>
        <button>Client C</button>
        <button>Client D</button>
        <button>Client E</button>
      </div>
      <div class="group">
        <h3>Mitarbeiter</h3>
        <button>Client F</button>
        <button>Client G</button>
        <button>Client H</button>
        <button>Client I</button>
        <button>Client J</button>
      </div>
    </div>

  </div>

  <script>
    function togglePasswordVisibility() {
      var passwordInput = document.getElementById("passwort");
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
      } else {
        passwordInput.type = "password";
      }
    }
  </script>
</body>
</html>
